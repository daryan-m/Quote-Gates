name: wisdom_app
description: A premium wisdom app with daily quotes, notes, reminders, and sharing features
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  shared_preferences: ^2.2.2
  flutter_local_notifications: ^17.2.3
  gal: ^2.3.2
  permission_handler: ^11.3.1
  screenshot: ^3.0.0
  path_provider: ^2.1.4
  intl: ^0.18.1
  sqflite: ^2.3.3
  path: ^1.9.0
  timezone: ^0.9.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/quotes/
    - assets/historical_events.json
