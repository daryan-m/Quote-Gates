name: wisdom_app
description: A premium wisdom app with daily quotes, notes, reminders, and sharing features
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0' # لێرە گۆڕیمان بۆ 3.4.0

dependencies:
  flutter:
    sdk: flutter
  shared_preferences: ^2.2.2
  flutter_local_notifications: ^20.1.0
  image_gallery_saver: ^2.0.3
  screenshot: ^3.0.0
  path_provider: ^2.1.4
  intl: ^0.20.2
  sqflite: ^2.3.0
  path: ^1.8.3
  flutter_timezone: ^5.0.2
  timezone: ^0.10.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/quotes/